# =============================================================================
# AquaAgent — Training Hyperparameters
# All values grounded directly in the paper (Section 4.3).
# =============================================================================

# ---------------------------------------------------------------------------
# Anomaly Detection Agent (ADA) — supervised pre-training
# ---------------------------------------------------------------------------
ada:
  # TCN encoder (paper: 4 layers, 64 channels, kernel size 3)
  tcn:
    num_layers: 4
    num_channels: 64
    kernel_size: 3
    dropout: 0.1
    # Dilations follow standard TCN schedule (Assumption A5): 1, 2, 4, 8
    dilations: [1, 2, 4, 8]
    lookback_window: 30             # 30-step temporal lookback
    latent_dim: 128                 # h_t dimensionality

  # GAT anomaly scorer (paper: 3 attention heads)
  gat:
    num_heads: 3
    hidden_dim: 64
    output_dim: 1                   # Per-edge anomaly logit
    dropout: 0.1
    concat_heads: true              # Concatenate vs. average heads (A6)

  # Training
  training:
    epochs: 100
    optimizer: "adam"
    learning_rate: 1.0e-3
    weight_decay: 1.0e-5
    batch_size: 256
    loss: "bce"                     # Binary cross-entropy
    pos_weight: 2.0                 # Upweight positive (leak) class
    scheduler: "cosine"
    scheduler_T_max: 100
    early_stopping_patience: 15
    gradient_clip_norm: 1.0
    val_metric: "f1"                # Metric used for checkpoint selection

  # Anomaly threshold (paper: τ = 0.5, calibrated on validation set)
  threshold: 0.5

  # LSTM gap imputer (Assumption A3)
  lstm_imputer:
    hidden_dim: 64
    num_layers: 1
    max_gap_steps: 10               # Maximum gap length for LSTM imputation

# ---------------------------------------------------------------------------
# Decision Agent — MAPPO multi-agent reinforcement learning
# ---------------------------------------------------------------------------
mappo:
  # Policy network (paper: 2-layer MLP, 512-256 units, ReLU)
  actor:
    hidden_dims: [512, 256]
    activation: "relu"
    shared_across_agents: true

  # Value (critic) network mirrors actor architecture
  critic:
    hidden_dims: [512, 256]
    activation: "relu"
    centralised: true               # Centralised critic (CTDE, Assumption A9)

  # PPO hyperparameters (paper Section 4.3)
  ppo:
    total_steps: 1_000_000
    num_workers: 8
    learning_rate: 3.0e-4
    eps_clip: 0.2                   # ε in PPO clipping
    entropy_coeff: 0.01             # Entropy bonus coefficient
    value_loss_coeff: 0.5
    gae_lambda: 0.95                # GAE λ
    gamma: 0.99                     # Discount factor
    minibatch_size: 512
    num_epochs_per_update: 4        # PPO update epochs per rollout batch
    rollout_steps: 2048             # Steps per rollout collection
    gradient_clip_norm: 0.5
    normalize_advantages: true

  # Reward function coefficients (paper Equation 3)
  reward:
    alpha: 0.55                     # Delivery efficiency weight
    beta: 0.45                      # Leak loss penalty weight
    gamma_r: 2.0                    # Governance violation penalty

  # Checkpoint / evaluation
  checkpoint_interval: 50_000      # Steps between DA checkpoints
  eval_episodes: 10                 # Evaluation episodes per checkpoint
  eval_seed: 999

# ---------------------------------------------------------------------------
# Baselines
# ---------------------------------------------------------------------------
baselines:
  # B2: Centralised LSTM (paper: 128 units, 2 layers)
  lstm:
    hidden_dim: 128
    num_layers: 2
    learning_rate: 1.0e-3
    epochs: 100
    batch_size: 256

  # B1: Threshold percentile
  threshold:
    percentile: 5.0                 # Alert if pressure drops below this %ile of history
    history_days: 30

# ---------------------------------------------------------------------------
# Dataset splits (by calendar month to avoid temporal leakage)
# ---------------------------------------------------------------------------
dataset:
  train_months: [1, 2, 3, 4, 5, 6, 7, 8, 9]    # Months 1-9  (~70%)
  val_months: [10, 11]                            # Months 10-11 (~15%)
  test_months: [12]                               # Month 12    (~15%)
  stride: 60                                      # Window stride in seconds (Assumption A10)
  lookback: 30                                    # Matching TCN window
